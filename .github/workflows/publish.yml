name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type the version to publish (must match packages/munchkins/package.json)"
        required: true
        type: string

jobs:
  guard:
    name: guard (dispatch only)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify confirm input matches package version
        run: |
          PKG_VERSION=$(node -p "require('./packages/munchkins/package.json').version")
          CORE_VERSION=$(node -p "require('./packages/munchkins-core/package.json').version")
          if [ "$PKG_VERSION" != "$CORE_VERSION" ]; then
            echo "version mismatch: munchkins=$PKG_VERSION munchkins-core=$CORE_VERSION"
            exit 1
          fi
          if [ "${{ inputs.confirm }}" != "$PKG_VERSION" ]; then
            echo "confirm input '${{ inputs.confirm }}' does not match package version '$PKG_VERSION'"
            exit 1
          fi
          echo "publishing v$PKG_VERSION"

  gate:
    name: gate (lint + test)
    needs: [guard]
    if: |
      always() &&
      (github.event_name == 'push' || needs.guard.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install
        run: bun install --frozen-lockfile
      - name: Biome CI
        run: bunx biome ci .
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Scenario harness
        run: bun run scenario

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org/"
      - name: Upgrade npm to >=11.5.1 (required for Trusted Publishing)
        run: npm install -g npm@latest
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install
        run: bun install --frozen-lockfile
      - name: Rewrite workspace:* deps to concrete versions
        run: |
          node <<'EOF'
          const fs = require('fs');
          const corePkg = JSON.parse(fs.readFileSync('packages/munchkins-core/package.json', 'utf8'));
          const path = 'packages/munchkins/package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          if (pkg.dependencies?.['@serranolabs.io/munchkins-core'] === 'workspace:*') {
            pkg.dependencies['@serranolabs.io/munchkins-core'] = corePkg.version;
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            console.log(`rewrote munchkins-core dep -> ${corePkg.version}`);
          }
          EOF
      - name: Publish munchkins-core to npm
        run: npm publish --workspace @serranolabs.io/munchkins-core --access public --provenance
      - name: Publish munchkins to npm
        run: npm publish --workspace @serranolabs.io/munchkins --access public --provenance
